<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>たからさがし</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kaisei+Decol:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   たからさがし — CSS  v5
   ═══════════════════════════════ */

:root {
  --paper:        #fdf6e3;
  --paper2:       #fef9f0;
  --deep:         #2d1b00;
  --amber:        #e8860a;
  --amber-light:  #ffd166;
  --amber-pale:   #fff3cd;
  --teal:         #0a9396;
  --teal-light:   #94d2bd;
  --coral:        #e76f51;
  --coral-light:  #f4a261;
  --mint:         #52b788;
  --mint-light:   #b7e4c7;
  --lavender:     #9b89c4;
  --shadow:       rgba(45,27,0,0.10);
  --tab-h:        48px;
  --chat-fs:      14px; /* 文字サイズ: 中=14px, 大=20px */
}

* { margin:0; padding:0; box-sizing:border-box; }

/* フォントサイズクラス */
body.fs-large {
  --chat-fs: 20px;
}

body {
  background: var(--paper);
  font-family:'Zen Maru Gothic',sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image: repeating-linear-gradient(
    transparent,transparent 27px,
    rgba(232,134,10,0.07) 27px,rgba(232,134,10,0.07) 28px
  );
}

/* ── アプリラッパー (フルスクリーン) ── */
#app {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* ── コンテンツ ── */
.content { padding:16px 18px 16px; overflow-y:auto; flex:1; }

/* ══════════════════════════════
   付箋タブバー（常に全表示）
   ══════════════════════════════ */
.tabs {
  display:flex; align-items:flex-end;
  padding:0 4px; gap:2px;
  flex-shrink:0;
  height:var(--tab-h);
  background:var(--paper);
}
.tab {
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  gap:1px; padding:0 4px; height:36px;
  border-radius:8px 8px 0 0;
  font-size:8px; font-weight:700;
  cursor:pointer; transition:all .15s;
  color:rgba(45,27,0,0.45);
  background:rgba(45,27,0,0.07);
  border:1.5px solid transparent; border-bottom:none;
  letter-spacing:0.01em; flex:1;
  position:relative; bottom:-1px;
  white-space:nowrap; min-width:0;
}
.tab.active {
  height:40px;
  background:var(--paper);
  color:var(--deep);
  border-color:rgba(232,134,10,0.25);
  box-shadow:0 -2px 6px rgba(232,134,10,0.1);
  z-index:2;
}
.tab-home.active { border-top:3px solid var(--amber); }
.tab-cal.active  { border-top:3px solid var(--teal); }
.tab-box.active  { border-top:3px solid var(--coral); }
.tab-note.active { border-top:3px solid var(--mint); }
.tab-fav.active  { border-top:3px solid #ffd166; }
.tab-set.active  { border-top:3px solid var(--lavender); }
.tab-icon { font-size:14px; line-height:1; }
.tab-label { font-size:7.5px; }
.tab-line {
  height:2px; flex-shrink:0;
  background:linear-gradient(90deg,
    rgba(232,134,10,0.2),rgba(232,134,10,0.08),rgba(232,134,10,0.2));
}

/* ══════════════════════════════
   会話中ヘッダー
   ══════════════════════════════ */
.chat-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px; flex-shrink:0;
  background:var(--paper);
  border-bottom:1px solid rgba(232,134,10,0.15);
}
.chat-header-info { display:flex; align-items:center; gap:8px; }
.chat-header-emoji { font-size:20px; }
.chat-header-name  { font-size:13px; font-weight:700; color:var(--deep); }
.chat-header-lens  {
  font-size:10px; color:var(--coral);
  background:rgba(231,111,81,0.1); padding:2px 8px; border-radius:12px;
}
.chat-close-btn {
  width:30px; height:30px; border-radius:50%;
  background:rgba(45,27,0,0.07); border:none;
  font-size:14px; color:rgba(45,27,0,0.5);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* ══════════════════════════════
   ボタン
   ══════════════════════════════ */
.btn-primary {
  display:block; width:100%; padding:13px;
  background:var(--amber); color:white; border:none; border-radius:14px;
  font-family:'Kaisei Decol',serif; font-size:15px; letter-spacing:0.12em;
  cursor:pointer; box-shadow:0 4px 0 rgba(180,90,0,0.35);
  transition:transform .1s,box-shadow .1s; margin-bottom:10px;
}
.btn-primary:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(180,90,0,0.35); }
.btn-secondary {
  display:block; width:100%; padding:11px;
  background:white; color:var(--deep);
  border:2px solid rgba(45,27,0,0.12); border-radius:14px;
  font-size:13px; cursor:pointer; margin-bottom:10px;
}
.btn-dark {
  display:block; width:100%; padding:13px;
  background:var(--deep); color:var(--amber-light); border:none; border-radius:14px;
  font-family:'Kaisei Decol',serif; font-size:15px; letter-spacing:0.12em;
  cursor:pointer; box-shadow:0 4px 0 rgba(0,0,0,0.28);
  transition:transform .1s,box-shadow .1s;
}
.btn-dark:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,0.28); }
.btn-dark:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* ══════════════════════════════
   フォーム
   ══════════════════════════════ */
.form-block {
  background:white; border-radius:16px; padding:14px; margin-bottom:12px;
  border:1.5px solid rgba(45,27,0,0.07);
  box-shadow:0 1px 4px rgba(45,27,0,0.04);
}
.form-label { font-size:10px; letter-spacing:.15em; color:rgba(45,27,0,0.4); margin-bottom:8px; }
.form-label em { color:var(--amber); font-style:normal; }
.form-input {
  width:100%; border:2px solid rgba(45,27,0,0.1); border-radius:10px;
  padding:9px 12px; font-family:'Zen Maru Gothic',sans-serif; font-size:14px;
  color:var(--deep); outline:none; background:var(--paper2);
}
.form-input:focus { border-color:var(--amber); background:white; }
.form-input.error { border-color:var(--coral); }
.form-error { font-size:10px; color:var(--coral); margin-top:4px; display:none; }
.form-error.show { display:block; }

/* ── タイプ選択 ── */
.type-grid { display:flex; flex-direction:column; gap:8px; }
.type-card {
  border-radius:14px; border:2px solid rgba(45,27,0,0.08);
  padding:12px 14px; cursor:pointer; transition:all .15s;
  background:white; display:flex; align-items:center; gap:12px;
}
.type-card.sel-A { background:rgba(255,209,102,0.15); border-color:var(--amber); }
.type-card.sel-B { background:rgba(10,147,150,0.08);  border-color:var(--teal); }
.type-card.sel-C { background:rgba(155,137,196,0.12); border-color:var(--lavender); }
.type-badge { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.type-badge-A { background:var(--amber-pale); }
.type-badge-B { background:rgba(10,147,150,0.1); }
.type-badge-C { background:rgba(155,137,196,0.12); }
.type-info { flex:1; }
.type-name { font-size:13px; font-weight:700; color:var(--deep); margin-bottom:2px; }
.type-desc { font-size:10px; color:rgba(45,27,0,0.45); line-height:1.4; }

/* ── 呼び方チップ ── */
.parent-chips { display:flex; gap:7px; flex-wrap:wrap; }
.parent-chip {
  padding:6px 12px; border-radius:20px;
  border:2px solid rgba(45,27,0,0.1);
  background:white; font-size:12px; color:rgba(45,27,0,0.5); cursor:pointer;
}
.parent-chip.sel { background:var(--teal-light); border-color:var(--teal); color:var(--teal); font-weight:700; }

/* ── オンボーディング ── */
.step-dots { display:flex; gap:6px; justify-content:center; margin-bottom:16px; }
.step-dot  { width:6px; height:6px; border-radius:50%; background:rgba(45,27,0,0.15); transition:all .2s; }
.step-dot.active { background:var(--amber); width:18px; border-radius:3px; }
.step-dot.done   { background:var(--mint); }
.onboard-wrap { display:flex; flex-direction:column; padding:24px 18px 28px; flex:1; overflow-y:auto; }
.onboard-hero { text-align:center; margin-bottom:18px; }
.onboard-emoji { font-size:52px; display:block; margin-bottom:8px; }
.onboard-ttl   { font-family:'Kaisei Decol',serif; font-size:22px; color:var(--deep); margin-bottom:4px; }
.onboard-ttl em { color:var(--amber); font-style:normal; }
.onboard-sub   { font-size:12px; color:rgba(45,27,0,0.45); line-height:1.7; }

/* ══════════════════════════════
   ホーム
   ══════════════════════════════ */
.home-greeting { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.home-greeting-emoji { font-size:32px; }
.home-greeting-name  { font-family:'Kaisei Decol',serif; font-size:16px; color:var(--deep); }
.home-greeting-sub   { font-size:11px; color:rgba(45,27,0,0.45); }
.home-type-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700;
  cursor:pointer; margin-bottom:14px;
}
.htb-A { background:var(--amber-pale); color:var(--amber); }
.htb-B { background:rgba(10,147,150,0.1); color:var(--teal); }
.htb-C { background:rgba(155,137,196,0.12); color:var(--lavender); }
.section-ttl { font-size:9px; letter-spacing:.2em; color:rgba(45,27,0,0.35); margin-bottom:9px; }

.odai-random {
  background:linear-gradient(135deg,var(--amber),var(--coral-light));
  border-radius:16px; padding:14px 16px; margin-bottom:12px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 4px 12px rgba(232,134,10,0.22); cursor:pointer; position:relative;
}
.odai-random-icon  { font-size:30px; flex-shrink:0; }
.odai-random-label { font-size:9px; color:rgba(255,255,255,0.7); letter-spacing:.15em; margin-bottom:2px; }
.odai-random-name  { font-family:'Kaisei Decol',serif; font-size:17px; color:white; }
.odai-random-arrow { font-size:20px; color:rgba(255,255,255,0.55); margin-left:auto; }
.reroll-btn {
  position:absolute; top:8px; right:10px;
  font-size:10px; color:rgba(255,255,255,0.75);
  background:rgba(255,255,255,0.18); border:none; border-radius:20px;
  padding:3px 8px; cursor:pointer; font-family:'Zen Maru Gothic',sans-serif;
}
.odai-generating {
  background:rgba(232,134,10,0.08); border-radius:16px; padding:14px 16px; margin-bottom:12px;
  display:flex; align-items:center; gap:12px; border:1.5px dashed rgba(232,134,10,0.3);
}
.free-section { background:white; border-radius:14px; padding:12px 14px; margin-bottom:12px; border:1.5px solid rgba(45,27,0,0.07); }
.free-label   { font-size:10px; letter-spacing:.1em; color:rgba(45,27,0,0.4); margin-bottom:7px; }
.free-row     { display:flex; gap:8px; align-items:center; }
.free-input {
  flex:1; border:2px solid rgba(45,27,0,0.1); border-radius:22px;
  padding:8px 13px; font-family:'Zen Maru Gothic',sans-serif; font-size:12px;
  color:var(--deep); outline:none; background:var(--paper2);
}
.free-input:focus { border-color:var(--amber); background:white; }
.free-go {
  width:34px; height:34px; border-radius:50%; background:var(--amber); border:none;
  font-size:15px; color:white; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.photo-row {
  background:rgba(10,147,150,0.05);
  border-radius:14px; padding:12px 14px;
  border:1.5px dashed rgba(10,147,150,0.3); cursor:pointer; position:relative;
  display:flex; align-items:center; gap:12px;
}
.photo-row input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.photo-row-ttl { font-size:13px; font-weight:700; color:var(--teal); margin-bottom:1px; }
.photo-row-sub { font-size:10px; color:rgba(45,27,0,0.4); }
.photo-row-icon { font-size:26px; }

/* ══════════════════════════════
   レンズ選択
   ══════════════════════════════ */
.odai-pill {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--amber-pale); border-radius:22px; padding:7px 14px;
  margin-bottom:12px; border:1.5px solid rgba(232,134,10,0.2);
}
.odai-pill-emoji { font-size:20px; }
.odai-pill-name  { font-family:'Kaisei Decol',serif; font-size:15px; color:var(--deep); }
.lens-hint { font-size:11px; color:rgba(45,27,0,0.45); margin-bottom:12px; line-height:1.6; }
.lens-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.lens-card {
  border-radius:14px; border:2px solid transparent; cursor:pointer;
  padding:12px 10px; display:flex; align-items:flex-start; gap:8px; transition:all .15s;
  flex-direction:column;
}
.lens-card.selected { box-shadow:0 0 0 2px currentColor,0 0 0 4px rgba(255,255,255,0.8); transform:scale(1.02); }
.lens-ことば  { background:rgba(231,111,81,0.1);  color:var(--coral);    border-color:rgba(231,111,81,0.2); }
.lens-かず    { background:rgba(10,147,150,0.1);   color:var(--teal);     border-color:rgba(10,147,150,0.2); }
.lens-かがく  { background:rgba(82,183,136,0.1);   color:var(--mint);     border-color:rgba(82,183,136,0.2); }
.lens-しゃかい{ background:rgba(232,134,10,0.1);   color:var(--amber);    border-color:rgba(232,134,10,0.2); }
.lens-えいご  { background:rgba(155,137,196,0.1);  color:var(--lavender); border-color:rgba(155,137,196,0.2); }
.lens-じぶん  { background:rgba(255,209,102,0.18); color:#b8860b;         border-color:rgba(255,209,102,0.4); }
.lens-icon { font-size:22px; }
.lens-info { flex:1; }
.lens-name { font-size:13px; font-weight:700; }
.lens-desc { font-size:9px; opacity:.75; margin-top:3px; line-height:1.45; }

/* ══════════════════════════════
   チャット
   ══════════════════════════════ */
.chat-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; padding:12px 16px 10px; }
.speaker-row { display:flex; gap:8px; margin-bottom:10px; flex-shrink:0; }
.speaker-btn {
  flex:1; padding:7px; border-radius:12px; border:2px solid rgba(45,27,0,0.1);
  font-size:11px; font-weight:700; cursor:pointer; text-align:center; transition:all .15s;
  background:white; color:rgba(45,27,0,0.4);
}
.speaker-btn.active-child  { background:rgba(10,147,150,0.1);  color:var(--teal); border-color:var(--teal); }
.speaker-btn.active-parent { background:rgba(82,183,136,0.1);  color:var(--mint); border-color:var(--mint); }
.chat-area { display:flex; flex-direction:column; gap:10px; overflow-y:auto; flex:1; margin-bottom:10px; }
.bubble-ai  { display:flex; gap:8px; align-items:flex-end; }
.ai-avatar  {
  width:28px; height:28px; border-radius:50%;
  background:linear-gradient(135deg,var(--amber),var(--coral-light));
  display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0;
}
.bubble-ai-text {
  background:white; border-radius:16px 16px 16px 4px;
  padding:9px 12px; font-size:var(--chat-fs); line-height:1.75; color:var(--deep);
  max-width:75%; box-shadow:0 2px 8px var(--shadow);
}
.bubble-child { display:flex; justify-content:flex-end; }
.bubble-child-text {
  background:var(--teal); border-radius:16px 16px 4px 16px;
  padding:9px 12px; font-size:var(--chat-fs); line-height:1.75; color:white; max-width:75%;
}
.bubble-parent-wrap { display:flex; flex-direction:column; align-items:flex-end; }
.bubble-parent-who  { font-size:9px; color:rgba(45,27,0,0.35); margin-bottom:2px; }
.bubble-parent-text {
  background:var(--mint); border-radius:16px 16px 4px 16px;
  padding:9px 12px; font-size:var(--chat-fs); line-height:1.75; color:white; max-width:75%;
}
.typing-dots { display:flex; gap:4px; padding:2px 0; }
.typing-dots span { width:6px; height:6px; background:var(--amber); border-radius:50%; animation:bounce 1s infinite; }
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-4px);opacity:1} }
.chat-input-row { display:flex; gap:7px; align-items:center; flex-shrink:0; margin-bottom:8px; }
.chat-input {
  flex:1; background:white; border:2px solid rgba(45,27,0,0.1); border-radius:22px;
  padding:9px 13px; font-family:'Zen Maru Gothic',sans-serif; font-size:14px;
  color:var(--deep); outline:none;
}
.chat-input:focus { border-color:var(--amber); }
.chat-send {
  width:36px; height:36px; background:var(--amber); border:none; border-radius:50%;
  font-size:15px; color:white; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.chat-send:disabled { opacity:.4; cursor:not-allowed; }
.finish-btn {
  display:block; width:100%; padding:10px;
  background:var(--deep); color:var(--amber-light); border:none;
  border-radius:14px; font-family:'Kaisei Decol',serif; font-size:14px;
  letter-spacing:.12em; cursor:pointer; box-shadow:0 3px 0 rgba(0,0,0,0.22); flex-shrink:0;
}
/* エラーリトライUI */
.chat-error-row {
  display:flex; align-items:center; gap:8px;
  background:rgba(231,111,81,0.08); border-radius:12px; padding:8px 12px;
  margin-bottom:8px; font-size:11px; color:var(--coral);
}
.retry-btn {
  padding:4px 10px; background:var(--coral); color:white; border:none;
  border-radius:20px; font-size:10px; cursor:pointer; white-space:nowrap;
}

/* ══════════════════════════════
   サマリー
   ══════════════════════════════ */
.summary-hero { text-align:center; padding:8px 0 14px; }
.summary-hero-emoji { font-size:44px; display:block; margin-bottom:4px; }
.summary-hero-ttl   { font-family:'Kaisei Decol',serif; font-size:17px; color:var(--deep); }
.findings-card {
  background:white; border-radius:16px; padding:14px; margin-bottom:12px;
  border:1.5px solid rgba(45,27,0,0.07); position:relative;
}
.findings-label { font-size:9px; letter-spacing:.2em; color:rgba(45,27,0,0.35); margin-bottom:10px; }
.finding-item   { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
.finding-item:last-child { margin-bottom:0; }
.finding-dot    { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.finding-text   { font-size:12px; color:var(--deep); line-height:1.7; }
.bookmark-btn {
  position:absolute; top:10px; right:12px;
  background:none; border:none; font-size:20px; cursor:pointer;
  opacity:.4; transition:all .2s; line-height:1;
}
.bookmark-btn.active { opacity:1; transform:scale(1.2); }
.ai-opinion-card {
  background:linear-gradient(135deg,#fffbf0,#fff3cd);
  border-radius:14px; padding:12px 14px; margin-bottom:12px;
  border:1.5px solid rgba(232,134,10,0.2); position:relative; overflow:hidden;
}
.ai-opinion-card::before { content:'💡'; position:absolute; top:-6px; right:-2px; font-size:44px; opacity:.07; }
.ai-opinion-toggle { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.ai-opinion-label   { font-size:10px; letter-spacing:.2em; color:var(--amber); font-weight:700; }
.ai-opinion-chevron { font-size:13px; color:var(--amber); transition:transform .2s; }
.ai-opinion-chevron.open { transform:rotate(180deg); }
.ai-opinion-body { margin-top:10px; }
.ai-opinion-para { font-size:12px; color:var(--deep); line-height:1.85; margin-bottom:7px; }
.ai-opinion-para:last-child { margin-bottom:0; }
.summary-actions { display:flex; gap:8px; margin-bottom:12px; }
.btn-again     { flex:1; padding:10px; background:white; color:var(--deep); border:2px solid rgba(45,27,0,0.12); border-radius:14px; font-size:12px; cursor:pointer; }
.btn-next-odai { flex:1.4; padding:10px; background:var(--amber); color:white; border:none; border-radius:14px; font-family:'Kaisei Decol',serif; font-size:13px; letter-spacing:.1em; cursor:pointer; box-shadow:0 3px 0 rgba(180,90,0,0.28); }

/* きろくノート */
.note-card {
  background:linear-gradient(135deg,#f0fff4,#e8fdf0);
  border-radius:14px; padding:12px 14px; margin-bottom:12px;
  border:1.5px solid rgba(82,183,136,0.25);
}
.note-label { font-size:9px; letter-spacing:.2em; color:var(--mint); font-weight:700; margin-bottom:8px; }
.note-textarea {
  width:100%; border:2px solid rgba(82,183,136,0.2); border-radius:10px;
  padding:8px 12px; font-family:'Zen Maru Gothic',sans-serif; font-size:13px;
  color:var(--deep); outline:none; background:white; resize:none; min-height:64px;
  line-height:1.7;
}
.note-textarea:focus { border-color:var(--mint); }
.note-save-btn {
  margin-top:6px; padding:6px 16px; background:var(--mint); color:white;
  border:none; border-radius:20px; font-size:11px; cursor:pointer; font-weight:700;
}

/* ══════════════════════════════
   カレンダー演出
   ══════════════════════════════ */
.cal-burst-wrap { position:fixed; inset:0; pointer-events:none; z-index:9999; }
.cal-burst-item {
  position:absolute; font-size:22px;
  animation:burst-fly 1.2s ease-out forwards; opacity:0;
}
@keyframes burst-fly {
  0%   { transform:translate(-50%,-50%) scale(0);   opacity:1; }
  60%  { transform:translate(-50%,-50%) scale(1.3); opacity:1; }
  100% { transform:translate(var(--tx),var(--ty)) scale(0.5); opacity:0; }
}

/* ── カレンダー本体 ── */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cal-month  { font-family:'Kaisei Decol',serif; font-size:17px; color:var(--deep); }
.cal-nav    { background:none; border:none; font-size:18px; color:rgba(45,27,0,0.35); cursor:pointer; padding:4px 8px; }
.cal-grid   { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:16px; }
.cal-dow    { text-align:center; font-size:9px; color:rgba(45,27,0,0.4); padding:4px 0; letter-spacing:.05em; }
.cal-dow.sun { color:var(--coral); }
.cal-dow.sat { color:var(--teal); }
.cal-day {
  aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; font-size:11px;
  color:rgba(45,27,0,0.5); cursor:default;
  background:rgba(255,255,255,0.5);
}
.cal-day.empty   { background:transparent; }
.cal-day.today   { background:var(--amber-pale); color:var(--amber); font-weight:700; border:1.5px solid rgba(232,134,10,0.3); }
.cal-day.stamped { background:white; cursor:pointer; }
.cal-day.stamped:hover { background:var(--amber-pale); }
.cal-stamp { font-size:14px; line-height:1; }
.cal-streak {
  background:linear-gradient(135deg,var(--amber-pale),#fff8e7);
  border-radius:14px; padding:12px 14px; margin-bottom:14px;
  border:1.5px solid rgba(232,134,10,0.18);
  display:flex; align-items:center; gap:12px;
}
.cal-streak-num { font-family:'Kaisei Decol',serif; font-size:28px; color:var(--amber); }
.cal-streak-lbl { font-size:11px; color:rgba(45,27,0,0.5); }

/* モーダル */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:center; z-index:100;
}
.modal-box {
  background:var(--paper); border-radius:20px; padding:20px;
  width:min(340px,92vw); max-height:75vh; overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.modal-ttl { font-family:'Kaisei Decol',serif; font-size:16px; color:var(--deep); margin-bottom:12px; }
.modal-close { float:right; background:none; border:none; font-size:20px; cursor:pointer; color:rgba(45,27,0,0.4); }

/* ══════════════════════════════
   たからばこ・おきにいり共通
   ══════════════════════════════ */
.stats-row { display:flex; gap:8px; margin-bottom:16px; }
.stat-box  { flex:1; background:white; border-radius:14px; padding:10px 8px; text-align:center; border:1.5px solid rgba(45,27,0,0.06); }
.stat-num  { font-family:'Kaisei Decol',serif; font-size:24px; color:var(--amber); }
.stat-lbl  { font-size:9px; color:rgba(45,27,0,0.4); letter-spacing:.1em; }
.takara-item {
  background:white; border-radius:14px; padding:12px 14px; margin-bottom:8px;
  border:1.5px solid rgba(45,27,0,0.06); position:relative;
}
.takara-item-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.takara-item-emoji  { font-size:22px; }
.takara-item-name   { font-size:13px; font-weight:700; color:var(--deep); flex:1; }
.takara-item-lens   {
  font-size:9px; padding:2px 7px; border-radius:12px;
  background:rgba(231,111,81,0.1); color:var(--coral); font-weight:700;
}
.takara-item-date   { font-size:9px; color:rgba(45,27,0,0.35); }
.takara-findings    { display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
.takara-finding     { display:flex; gap:6px; align-items:flex-start; font-size:11px; color:var(--deep); line-height:1.5; }
.takara-fav-btn {
  position:absolute; top:10px; right:12px;
  background:none; border:none; font-size:18px; cursor:pointer;
  opacity:.35; transition:all .2s;
}
.takara-fav-btn.active { opacity:1; transform:scale(1.15); }
.takara-note {
  margin-top:6px; padding:6px 10px; background:rgba(82,183,136,0.08);
  border-radius:8px; font-size:10px; color:var(--deep); line-height:1.6;
  border-left:3px solid var(--mint);
}
.empty-msg { text-align:center; padding:32px 0; color:rgba(45,27,0,0.35); font-size:13px; line-height:2; }

/* バッジ */
.badge-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.badge     { padding:5px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-on  { background:var(--amber-pale); color:var(--amber); }
.badge-off { background:rgba(45,27,0,0.05); color:rgba(45,27,0,0.25); }

/* ── レンズ比較 ── */
.lens-compare-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.lens-compare-row {
  background:white; border-radius:12px; padding:10px 12px;
  border:1.5px solid rgba(45,27,0,0.06);
  display:flex; align-items:center; gap:10px;
}
.lens-compare-bar-wrap { flex:1; background:rgba(45,27,0,0.06); border-radius:6px; height:8px; overflow:hidden; }
.lens-compare-bar { height:100%; border-radius:6px; transition:width .4s; }
.lens-compare-count { font-size:11px; font-weight:700; color:var(--deep); min-width:24px; text-align:right; }

/* ── ウィークリーレポート ── */
.report-card {
  background:linear-gradient(135deg,#fffbf0,#fff8e7);
  border-radius:14px; padding:14px; margin-bottom:12px;
  border:1.5px solid rgba(232,134,10,0.2);
}
.report-label { font-size:9px; letter-spacing:.2em; color:var(--amber); font-weight:700; margin-bottom:10px; }
.report-body { font-size:12px; color:var(--deep); line-height:1.85; }
.report-section { margin-bottom:10px; }
.report-section-ttl { font-size:10px; font-weight:700; color:var(--amber); margin-bottom:4px; }

/* ══════════════════════════════
   せってい
   ══════════════════════════════ */
.settings-section { background:white; border-radius:14px; padding:14px; margin-bottom:10px; border:1px solid rgba(45,27,0,0.06); }
.settings-ttl { font-size:9px; letter-spacing:.2em; color:rgba(45,27,0,0.35); margin-bottom:12px; }
.settings-field { margin-bottom:10px; }
.settings-field:last-child { margin-bottom:0; }
.settings-field-label { font-size:10px; color:rgba(45,27,0,0.45); margin-bottom:5px; }
.toggle-row   { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.toggle-label { font-size:12px; color:var(--deep); }
.toggle-sw    { width:40px; height:23px; border-radius:12px; background:rgba(45,27,0,0.15); position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
.toggle-sw.on { background:var(--amber); }
.toggle-knob  { position:absolute; top:3px; left:3px; width:17px; height:17px; border-radius:50%; background:white; transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
.toggle-sw.on .toggle-knob { transform:translateX(17px); }

/* 文字サイズ選択 */
.font-size-chips { display:flex; gap:7px; }
.font-size-chip {
  padding:6px 14px; border-radius:20px; border:2px solid rgba(45,27,0,0.1);
  background:white; font-size:12px; color:rgba(45,27,0,0.5); cursor:pointer;
}
.font-size-chip.sel { background:var(--amber-pale); border-color:var(--amber); color:var(--amber); font-weight:700; }

/* ── ユーティリティ ── */
.spinner {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(45,27,0,0.12); border-top-color:var(--amber);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* きろくノートタブ */
.note-tab-section { background:white; border-radius:14px; padding:14px; margin-bottom:10px; border:1.5px solid rgba(45,27,0,0.06); }
.note-entry {
  padding:10px 0; border-bottom:1px solid rgba(45,27,0,0.06);
}
.note-entry:last-child { border-bottom:none; }
.note-entry-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.note-entry-emoji { font-size:16px; }
.note-entry-name { font-size:12px; font-weight:700; color:var(--deep); }
.note-entry-date { font-size:9px; color:rgba(45,27,0,0.35); margin-left:auto; }
.note-entry-text { font-size:11px; color:var(--deep); line-height:1.6; padding-left:24px; }
</style>
</head>
<body>
<div id="app">
  <div id="tabs-wrap"></div>
  <div id="screen-root" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
</div>
<script>
/* ═══════════════════════════════
   UTILS — XSS-safe text escaping
   ═══════════════════════════════ */
function esc(str) {
  if (typeof str !== 'string') return '';
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
// AIレスポンス（信頼テキスト）の改行だけ許可
function aiText(str) {
  return esc(str).replace(/\n/g,'<br>');
}

/* ═══════════════════════════════
   たからさがし — render  v5
   ═══════════════════════════════ */

function renderTabs() {
  const tabs = [
    { id:'home', icon:'🏠', label:'ホーム',       cls:'tab-home' },
    { id:'cal',  icon:'🗓️', label:'カレンダー',   cls:'tab-cal'  },
    { id:'box',  icon:'📦', label:'たからばこ',   cls:'tab-box'  },
    { id:'note', icon:'📓', label:'ノート',       cls:'tab-note' },
    { id:'fav',  icon:'⭐', label:'おきにいり',   cls:'tab-fav'  },
    { id:'set',  icon:'⚙️', label:'せってい',     cls:'tab-set'  },
  ];
  return `
    <div class="tabs">
      ${tabs.map(t => `
        <div class="tab ${t.cls} ${S.tab === t.id ? 'active' : ''}"
             onclick="App.switchTab('${t.id}')">
          <span class="tab-icon">${t.icon}</span>
          <span class="tab-label">${t.label}</span>
        </div>`).join('')}
    </div>
    <div class="tab-line"></div>`;
}

function renderChatHeader() {
  const lens = LENSES.find(l => l.id === S.lens);
  return `
    <div class="chat-header">
      <div class="chat-header-info">
        <span class="chat-header-emoji">${esc(S.odai?.emoji || '')}</span>
        <span class="chat-header-name">${esc(S.odai?.name || '')}</span>
        ${lens ? `<span class="chat-header-lens">${lens.icon} ${esc(lens.name)}</span>` : ''}
      </div>
      <button class="chat-close-btn" onclick="App.closeChatFlow()">✕</button>
    </div>`;
}

// ── オンボーディング ──
function renderOnboard() {
  const s = S.step;
  const u = S.user;
  const dots = [0,1,2].map(i =>
    `<div class="step-dot ${i < s ? 'done' : i === s ? 'active' : ''}"></div>`
  ).join('');

  let body = '';
  if (s === 0) {
    body = `
      <div class="form-block">
        <div class="form-label">お子さんの <em>呼び方</em></div>
        <input class="form-input" id="ob-name" placeholder="例：はるくん" value="${esc(u.name)}">
        <div class="form-error" id="ob-name-err">なまえをいれてください</div>
      </div>
      <div class="form-block">
        <div class="form-label"><em>こどもタイプ</em>をえらんでね</div>
        <div class="type-grid">${renderTypeCards(u.type)}</div>
      </div>`;
  } else if (s === 1) {
    body = `
      <div class="form-block">
        <div class="form-label">すきなもの <em>（じゆうに）</em></div>
        <input class="form-input" id="ob-likes" placeholder="ポケモン・サッカー…" value="${esc(u.likes)}">
      </div>
      <div class="form-block">
        <div class="form-label">とくいなこと</div>
        <input class="form-input" id="ob-str" placeholder="えをかくこと…" value="${esc(u.strengths)}">
      </div>`;
  } else {
    body = `
      <div class="form-block">
        <div class="form-label"><em>いっしょにするひと</em>のよびかた</div>
        <div class="parent-chips">${renderParentChips(u.parentName)}</div>
      </div>
      <p style="font-size:11px;color:rgba(45,27,0,0.4);line-height:1.7;text-align:center;padding:0 8px;margin-top:4px">
        ⚙️ せってい からいつでも変えられます
      </p>`;
  }

  return `
    <div class="onboard-wrap">
      <div class="onboard-hero">
        <span class="onboard-emoji">🔍</span>
        <div class="onboard-ttl">たから<em>さがし</em></div>
        <div class="onboard-sub">毎日のふとした気づきが、<br>学びのたからになる</div>
      </div>
      <div class="step-dots">${dots}</div>
      ${body}
      <div style="padding-top:18px">
        <button class="btn-primary" onclick="App.obNext()">
          ${s < 2 ? 'つぎへ ›' : 'はじめる 🔍'}
        </button>
        ${s > 0 ? `<button class="btn-secondary" onclick="App.obBack()">← もどる</button>` : ''}
      </div>
    </div>`;
}

function renderTypeCards(current) {
  return TYPES.map(t => `
    <div class="type-card ${current === t.id ? 'sel-' + t.id : ''}"
         onclick="App.setType('${t.id}')">
      <div class="type-badge type-badge-${t.id}">${t.icon}</div>
      <div class="type-info">
        <div class="type-name">${t.name}</div>
        <div class="type-desc">${t.desc}</div>
      </div>
    </div>`).join('');
}

function renderParentChips(current) {
  return PARENT_OPTS.map(p => `
    <div class="parent-chip ${current === p ? 'sel' : ''}"
         onclick="App.setParent('${esc(p)}')">${esc(p)}</div>`).join('');
}

// ── ホーム ──
function renderHome() {
  const u    = S.user;
  const type = TYPES.find(t => t.id === u.type) || TYPES[0];
  const rec  = S.records.slice(-3).reverse();
  const r    = S.randOdai || pickRand();
  if (!S.randOdai) S.randOdai = r;

  return `
    <div class="content">
      <div class="home-greeting">
        <span class="home-greeting-emoji">🔍</span>
        <div>
          <div class="home-greeting-name">${esc(u.name)}、きょうも探検しよう！</div>
          <div style="font-size:11px;color:rgba(45,27,0,0.45)">きになること、なんでもOK</div>
        </div>
      </div>
      <div class="home-type-badge htb-${type.id}" onclick="App.switchTab('set')">
        ${type.icon} ${esc(type.name)} ›
      </div>

      ${S.odaiGenerating ? `
        <div class="odai-generating">
          <span class="spinner"></span>
          <div style="font-size:13px;color:rgba(45,27,0,0.5)">きょうのお題をかんがえてるよ…</div>
        </div>` : `
        <div class="odai-random" id="rand-card">
          <span class="odai-random-icon">${r.emoji}</span>
          <div>
            <div class="odai-random-label">🎲 ランダム</div>
            <div class="odai-random-name">${esc(r.name)}</div>
          </div>
          <span class="odai-random-arrow">›</span>
          <button class="reroll-btn" id="reroll-btn">ふりなおす</button>
        </div>`}

      <div class="free-section">
        <div class="free-label">✏️ いまどんなことが気になってる？</div>
        <div class="free-row">
          <input class="free-input" id="free-in" placeholder="なんでもにゅうりょくしてね…">
          <button class="free-go" id="free-go-btn">➤</button>
        </div>
      </div>

      <div class="photo-row">
        <input type="file" accept="image/*" id="photo-input">
        <span class="photo-row-icon">📷</span>
        <div>
          <div class="photo-row-ttl">しゃしんでお題をつくる</div>
          <div class="photo-row-sub">とった写真をAIがよみとるよ</div>
        </div>
        <span style="font-size:17px;color:rgba(10,147,150,0.4)">›</span>
      </div>

      ${rec.length > 0 ? `
        <div class="section-ttl" style="margin-top:12px">さいきんのたから</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${rec.map(r => `
            <div style="padding:6px 12px;border-radius:20px;background:var(--amber-pale);color:var(--amber);font-size:11px;font-weight:700;cursor:pointer"
                 onclick='App.replayOdai(${JSON.stringify(r.odai)})'>
              ${r.odai.emoji} ${esc(r.odai.name)}
            </div>`).join('')}
        </div>` : ''}
    </div>`;
}

// ── レンズ選択 ──
function renderLens() {
  return `
    <div class="content">
      <div style="margin-bottom:12px">
        <div class="odai-pill">
          <span class="odai-pill-emoji">${esc(S.odai.emoji)}</span>
          <span class="odai-pill-name">${esc(S.odai.name)}</span>
        </div>
      </div>
      <div class="lens-hint">どのレンズでみてみる？<br>ひとつだけえらんでね 🔍</div>
      <div class="lens-grid">
        ${LENSES.map(l => `
          <div class="lens-card ${l.cls} ${S.lens === l.id ? 'selected' : ''}"
               onclick="App.selectLens('${l.id}')">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="lens-icon">${l.icon}</span>
              <div class="lens-name">${esc(l.name)}</div>
            </div>
            <div class="lens-desc">${esc(l.kidDesc)}</div>
          </div>`).join('')}
      </div>
      <button class="btn-dark" onclick="App.startChat()" ${!S.lens ? 'disabled' : ''}>
        ${!S.lens ? 'レンズをえらんでね' : `${LENSES.find(l=>l.id===S.lens)?.icon} ${esc(S.lens)}レンズではじめる ›`}
      </button>
      <button class="btn-secondary" onclick="App.closeChatFlow()">← お題にもどる</button>
    </div>`;
}

// ── チャット ──
function renderChat() {
  const u = S.user;
  const userMsgCount = S.messages.filter(m => m.role !== 'ai').length;
  return `
    <div class="chat-wrap">
      <div class="speaker-row">
        <div class="speaker-btn ${S.speaker === 'child'  ? 'active-child'  : ''}"
             onclick="App.setSpeaker('child')">👦 ${esc(u.name || 'こども')}</div>
        <div class="speaker-btn ${S.speaker === 'parent' ? 'active-parent' : ''}"
             onclick="App.setSpeaker('parent')">👨 ${esc(u.parentName)}</div>
      </div>
      <div class="chat-area" id="chat-area">
        ${S.messages.map(renderBubble).join('')}
        ${S.isLoading ? `
          <div class="bubble-ai">
            <div class="ai-avatar">🔍</div>
            <div class="bubble-ai-text">
              <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
          </div>` : ''}
        ${S.lastError ? `
          <div class="chat-error-row">
            ⚠️ つながらなかったよ
            <button class="retry-btn" onclick="App.retryLastSend()">もう一度</button>
          </div>` : ''}
      </div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-in"
          placeholder="${S.speaker === 'child' ? 'かんがえてみよう…' : esc(u.parentName) + 'もかんがえてみよう…'}"
          ${S.isLoading ? 'disabled' : ''}>
        <button class="chat-send" id="chat-send" onclick="App.sendChat()"
          ${S.isLoading ? 'disabled' : ''}>➤</button>
      </div>
      ${userMsgCount >= 5
        ? `<button class="finish-btn" onclick="App.goSummary()">きょうのたからをまとめる ✨</button>`
        : `<div style="text-align:center;font-size:10px;color:rgba(45,27,0,0.3);margin-bottom:4px">あと${5 - userMsgCount}かい話したらまとめられるよ</div>`}
    </div>`;
}

function renderBubble(m) {
  if (m.role === 'ai') return `
    <div class="bubble-ai">
      <div class="ai-avatar">🔍</div>
      <div class="bubble-ai-text">${aiText(m.text)}</div>
    </div>`;
  if (m.role === 'child') return `

// ── カレンダー ──
function renderCal() {
  const now   = new Date();
  const year  = S.calYear  ?? now.getFullYear();
  const month = S.calMonth ?? now.getMonth();
  const isThisMonth = (year === now.getFullYear() && month === now.getMonth());

  const dayMap = {};
  S.records.forEach(r => {
    const d = new Date(r.date);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const day = d.getDate();
      if (!dayMap[day]) dayMap[day] = [];
      dayMap[day].push(r);
    }
  });

  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName   = `${year}年${month+1}月`;
  const dows        = ['日','月','火','水','木','金','土'];

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday   = isThisMonth && d === now.getDate();
    const isStamped = !!dayMap[d];
    const onclick   = isStamped ? `onclick="App.showDayTakara(${year},${month},${d})"` : '';
    cells += `
      <div class="cal-day ${isToday?'today':''} ${isStamped?'stamped':''}" ${onclick}>
        ${isStamped ? `<div class="cal-stamp">🔍</div>` : ''}
        <div style="font-size:${isStamped?'9':'11'}px;opacity:${isStamped?'.5':'1'}">${d}</div>
      </div>`;
  }

  return `
    <div class="content">
      <div class="cal-streak">
        <div>
          <div class="cal-streak-num">${S.streak}🔥</div>
          <div class="cal-streak-lbl">れんぞく日</div>
        </div>
        <div style="flex:1;font-size:11px;color:rgba(45,27,0,0.45);padding-left:8px;line-height:1.6">
          ${S.streak > 0 ? `${S.streak}日れんぞくでたからさがし中！` : 'きょうから始めよう！'}
        </div>
      </div>
      <div class="cal-header">
        <button class="cal-nav" onclick="App.calPrev()">‹</button>
        <div class="cal-month">${monthName}</div>
        <button class="cal-nav" onclick="App.calNext()">›</button>
      </div>
      <div class="cal-grid">
        ${dows.map((d,i) => `<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
        ${cells}
      </div>
      <div class="section-ttl">今月の発見 ${Object.keys(dayMap).length}日</div>
    </div>
    ${S.dayModal ? renderDayModal() : ''}`;
}

function renderDayModal() {
  const m = S.dayModal;
  const records = S.records.filter(r => {
    const d = new Date(r.date);
    return d.getFullYear()===m.year && d.getMonth()===m.month && d.getDate()===m.day;
  });
  return `
    <div class="modal-overlay" onclick="App.closeDayModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="App.closeDayModal()">✕</button>
        <div class="modal-ttl">${m.month+1}月${m.day}日のたから</div>
        ${records.map(r => renderTakaraCard(r, false)).join('')}
      </div>
    </div>`;
}

// ── localStorage 永続化 ──
const STORAGE_KEY = 'tks_v5_state';

function persistSave() {
  try {
    const toSave = {
      onboarded:     S.onboarded,
      user:          S.user,
      records:       S.records,
      streak:        S.streak,
      _lastPlayDate: S._lastPlayDate,
      showOpinion:   S.showOpinion,
      fontSize:      S.fontSize,
      weeklyReport:  S.weeklyReport,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch(e) { console.warn('save failed:', e); }
}

function persistLoad() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.assign(S, {
      onboarded:     saved.onboarded     ?? false,
      user:          { ...S.user, ...(saved.user || {}) },
      records:       saved.records       ?? [],
      streak:        saved.streak        ?? 0,
      _lastPlayDate: saved._lastPlayDate ?? null,
      showOpinion:   saved.showOpinion   ?? true,
      fontSize:      saved.fontSize      ?? 'medium',
      weeklyReport:  saved.weeklyReport  ?? '',
    });
  } catch(e) { console.warn('load failed:', e); }
}

// ── API ──
async function callAI(messages, system) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages, system }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data.text;
}

async function analyzePhoto(b64, mime) {
  const res = await fetch('/api/photo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ b64, mime }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// ── プロンプト ──
function chatSystem() {
  const u = S.user;
  const base = `あなたは「たからちゃん」です。
子どもが日常で見つけたものについて、一緒に考える案内役です。

【基本ルール】
- 子どもの答えをまず受け止めてから次の問いへ
- 1回の返答は2〜3文以内
- 絵文字を1つだけ使う
- 「なんとなく」も大切に受け取る
- 答えが出なくても「それでいいよ」と安心させる
- ${u.parentName}にも時々「${u.parentName}はどう思う？」と聞く
- 5往復ほどで「そろそろまとめようか」と提案する

【子どもの情報】
- 呼び方: ${u.name || 'お子さん'}
- 好きなもの: ${u.likes || '特になし'}
- 得意なこと: ${u.strengths || '特になし'}

【今回のお題】「${S.odai?.name}」`;

  const lensPrompts = {
    ことば: `【ことばレンズ】
- 「他の言い方をするとしたら？」と表現を広げる
- オノマトペ（ふわふわ・ざらざら）を使って表現を楽しむ`,
    かず: `【かずレンズ】
- 「いくつある？」「どのくらいの大きさ？」と数量を意識させる
- 「〇〇と比べると？」と比較する視点を引き出す`,
    かがく: `【かがくレンズ】
- 「なんでそうなってると思う？」と原因・理由を引き出す
- 「触ったらどんな感じ？」と変化を想像させる`,
    しゃかい: `【しゃかいレンズ】
- 「これは誰が作ったんだろう？」と人の役割に気づかせる
- 「どこから来たんだろう？」とものの流れを想像させる`,
    えいご: `【えいごレンズ】
- 英語の単語を教えるときはカタカナ読みも添える
- 「英語で言うと〇〇（カタカナ）だよ、言ってみよう！」と発話を促す`,
    じぶん: `【じぶんレンズ】
- 「好き？嫌い？なんで？」と自分の感情を言語化させる
- 「前に似たようなこと経験したことある？」と記憶とつなげる
- 「${u.name||'きみ'}だったらどうする？」と自分ごととして考えさせる`,
  };

  const typePrompts = {
    A: `【きづきタイプ】口調：やさしく、ゆっくり。ひらがな多め。短い文。
- 五感をフル活用した問いかけを中心にする`,
    B: `【ちしきタイプ】口調：少し知的でわくわくする感じ。「実はね」をよく使う。
- 言葉の由来や豆知識を会話に自然に混ぜる`,
    C: `【そうぞうタイプ】口調：一緒に冒険するような、わくわくした感じ。
- 「裏側はどうなってるんだろう？」と見えない部分を想像させる`,
  };

  return [base, lensPrompts[S.lens]||'', typePrompts[u.type]||''].join('\n\n');

function summarySystem() {
  const conv = S.messages.map(m => {
    const who = m.role==='ai' ? 'たからちゃん' : m.role==='child' ? S.user.name||'子ども' : S.user.parentName;
    return `[${who}] ${m.text}`;
  }).join('\n');
  const max = opinionMaxChars();

  return `あなたは「たからちゃん」です。以下の会話をもとにまとめを作ってください。

お題: ${S.odai?.name}　レンズ: ${S.lens}

【会話記録】
${conv}

【重要】findingsは必ず上記の会話の中で実際に出た言葉・気づき・発見をもとにしてください。

【出力形式】JSONのみ（Markdownなし）:
{
  "findings": ["会話に出た発見1（子どもの言葉を活かした短い文）","発見2","発見3"],
  "opinion": "子どもの答えを受け止めてから補足する意見。${max}文字以内。2〜3段落に分け\\nで改行。押しつけがましくない。${isSmallKid()?'ひらがな多め。':''}"
}`;
}

function weeklyReportSystem() {
  const u = S.user;
  const oneWeekAgo = Date.now() - 7 * 86400000;
  const weekRecs = S.records.filter(r => new Date(r.date).getTime() > oneWeekAgo);
  if (weekRecs.length === 0) return null;

  const summary = weekRecs.map(r =>
    `【${r.lens}レンズ】${r.odai.name}：${(r.findings||[]).join('、')}`
  ).join('\n');

  return `あなたは子どもの学びを見守るアドバイザーです。
以下は${u.name}さんの今週（7日間）のたからさがしの記録です。

${summary}

${u.parentName}向けに、以下を含む200字程度のレポートをJSONで返してください。
JSONのみ（Markdownなし）:
{
  "highlight": "今週いちばん印象的だった気づきや成長（1〜2文）",
  "growth": "子どもがどんな力を伸ばしているか（1〜2文）",
  "next": "来週試してみると良いこと・声かけのヒント（1〜2文）"
}`;
}

// ── Render ──
function render() {
  const root = $id('screen-root');
  const tw   = $id('tabs-wrap');

  if (!S.onboarded) {
    tw.style.display  = 'none';
    root.innerHTML    = renderOnboard();
    bindEvents();
    return;
  }

  const inFlow = ['lens','chat','summary'].includes(S.flow);
  if (inFlow) {
    tw.style.display = 'none';
    let content = '';
    if (S.flow==='lens')    content = renderLens();
    if (S.flow==='chat')    content = renderChat();
    if (S.flow==='summary') content = renderSummary();
    root.innerHTML = renderChatHeader() + content;
  } else {
    tw.style.display = 'block';
    tw.innerHTML     = renderTabs();
    const map = {
      home: renderHome,
      cal:  renderCal,
      box:  renderBox,
      note: renderNote,
      fav:  renderFav,
      set:  renderSettings,
    };
    root.innerHTML = (map[S.tab]||renderHome)();
  }
  bindEvents();
}

// ── イベントバインド ──
function bindEvents() {
  const ci = $id('chat-in');
  if (ci) ci.addEventListener('keydown', e => { if(e.key==='Enter') App.sendChat(); });

  const fi = $id('free-in');
  if (fi) fi.addEventListener('keydown', e => { if(e.key==='Enter') App.submitFree(); });

  const fg = $id('free-go-btn');
  if (fg) fg.addEventListener('click', () => App.submitFree());

  const rr = $id('reroll-btn');
  if (rr) rr.addEventListener('click', e => {
    e.stopPropagation();
    S.odaiGenerating = true;
    render();
    App._generateAiOdai();
  });

  const rc = $id('rand-card');
  if (rc) rc.addEventListener('click', () => App.goToLens(S.randOdai));

  const pi = $id('photo-input');
  if (pi) {
    pi.addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async ev => {
        const b64 = ev.target.result.split(',')[1];
        const safeType = /^image\/(jpeg|png|gif|webp)$/.test(file.type) ? file.type : 'image/jpeg';
        const loadingDiv = document.createElement('div');
        loadingDiv.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px';
        const img = document.createElement('img');
        img.src = `data:${safeType};base64,${b64}`;
        img.style.cssText = 'width:100%;max-height:200px;object-fit:cover;border-radius:16px';
        const sp = document.createElement('div'); sp.className = 'spinner';
        const tx = document.createElement('div');
        tx.style.cssText = 'font-size:13px;color:rgba(45,27,0,0.5)';
        tx.textContent = 'しゃしんをよんでいるよ…';
        loadingDiv.append(img, sp, tx);
        root.innerHTML = '';
        root.appendChild(loadingDiv);
        try {
          const result = await analyzePhoto(b64, file.type);
          App.goToLens(result);
        } catch(err) {
          console.error('photo error:', err);
          root.innerHTML = `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;text-align:center">
              <div style="font-size:36px">📷</div>
              <div style="font-size:13px;color:rgba(45,27,0,0.5)">よみとりに失敗したよ<br>もう一度ためしてみてね</div>
              <button class="btn-secondary" onclick="App.closeChatFlow()" style="width:auto;padding:8px 20px">もどる</button>
            </div>`;
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // スクリーンrootは bindEvents 内で使う
  const root = $id('screen-root');
}

function scrollChat() {
  setTimeout(() => {
    const el = $id('chat-area');
    if (el) el.scrollTop = el.scrollHeight;
  }, 80);
}

function burstCalAnimation() {
  const lensCount = {};
  S.records.forEach(r => { if (r.lens) lensCount[r.lens] = (lensCount[r.lens]||0) + 1; });
  const items = [];
  LENSES.forEach(l => { for(let i=0;i<(lensCount[l.id]||0);i++) items.push(l.icon); });
  if (items.length === 0) return;

  const wrap = document.createElement('div');
  wrap.className = 'cal-burst-wrap';
  document.body.appendChild(wrap);
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  items.forEach((icon, i) => {
    const el = document.createElement('div');
    el.className = 'cal-burst-item';
    el.textContent = icon;
    const angle = (i/items.length)*360, dist = 80+Math.random()*80;
    const rad = angle*Math.PI/180;
    el.style.left = cx+'px'; el.style.top = cy+'px';
    el.style.setProperty('--tx', Math.cos(rad)*dist+'px');
    el.style.setProperty('--ty', Math.sin(rad)*dist+'px');
    el.style.animationDelay = (i*.05)+'s';
    wrap.appendChild(el);
  });
  setTimeout(() => wrap.remove(), 2000);
}

// ── App ──
const App = {

  switchTab(tab) {
    const prev = S.tab;
    S.tab  = tab;
    S.flow = 'home';
    render();
    if (tab === 'cal' && prev !== 'cal') setTimeout(burstCalAnimation, 100);
  },

  closeChatFlow() { S.flow='home'; S.tab='home'; render(); },

  // ── オンボーディング ──
  obNext() {
    if (S.step === 0) {
      const name = $id('ob-name')?.value?.trim();
      if (!name) {
        $id('ob-name-err')?.classList.add('show');
        $id('ob-name')?.classList.add('error');
        return;
      }
      S.user.name = name;
    } else if (S.step === 1) {
      S.user.likes     = $id('ob-likes')?.value?.trim() || '';
      S.user.strengths = $id('ob-str')?.value?.trim()   || '';
    } else {
      S.onboarded = true; S.tab='home'; S.flow='home';
      persistSave(); render(); return;
    }
    S.step++;
    render();
  },
  obBack() { if(S.step>0){ S.step--; render(); } },
  setType(t)   { S.user.type=t; render(); },
  setParent(p) { S.user.parentName=p; render(); },

  // ── AI お題生成 ──
  async _generateAiOdai() {
    try {
      const res = await callAI(
        [{ role:'user', content:'日本の子ども（3〜9歳）が日常生活で目にしそうな具体的なものを1つ提案してください。JSONのみ: {"name":"ひらがな短い単語","emoji":"絵文字1つ","label":"カテゴリ"}' }],
        'JSONのみ返してください（Markdownなし）。具体的な身近なものを。'
      );
      const parsed = JSON.parse(res.replace(/```json|```/g,'').trim());
      S.randOdai = parsed;
    } catch {
      S.randOdai = pickRand();
    }
    S.odaiGenerating = false;
    render();
  },

  // ── お題→レンズへ ──
  goToLens(o) {
    S.odai=o; S.lens=null; S.flow='lens';
    S._savedThisSession=false; render();
  },
  replayOdai(o) { App.goToLens(o); },

  async submitFree() {
    const txt = $id('free-in')?.value?.trim();
    if (!txt) return;
    try {
      const res = await callAI(
        [{ role:'user', content:`子どもが「${txt}」と言いました。JSONのみ: {"name":"ひらがな短い単語","emoji":"絵文字","label":"カテゴリ"}` }],
        'JSONのみ返してください（Markdownなし）。'
      );
      App.goToLens(JSON.parse(res.replace(/```json|```/g,'').trim()));
    } catch {
      App.goToLens({ emoji:'✨', name:txt.slice(0,10), label:'きになること' });
    }
  },

  selectLens(id) { S.lens = S.lens===id ? null : id; render(); },

  // ── チャット開始 ──
  async startChat() {
    if (!S.lens) return;
    S.messages=[]; S.flow='chat'; S.isLoading=true; S.lastError=false;
    render();
    try {
      const text = await callAI(
        [{ role:'user', content:'最初の問いかけを1つだけ。' }],
        chatSystem()
      );
      S.messages.push({ role:'ai', text });
    } catch(err) {
      console.error('chat start error:', err);
      S.messages.push({ role:'ai', text:`${S.odai?.name}について、どんなことを知ってる？🔍` });
    }
    S.isLoading=false; render(); scrollChat();
  },

  setSpeaker(sp) { S.speaker=sp; render(); },

  // ── メッセージ送信 ──
  async sendChat() {
    const inp = $id('chat-in');
    const txt = inp?.value?.trim();
    if (!txt || S.isLoading) return;

    S.messages.push({ role:S.speaker, text:txt });
    S.isLoading=true; S.lastError=false;
    render(); scrollChat();

    const payload = App._buildApiMsgs();
    S.lastSendPayload = payload; // リトライ用に保存

    try {
      const text = await callAI(payload, chatSystem());
      S.messages.push({ role:'ai', text });
      S.lastError = false;
    } catch(err) {
      console.error('chat error:', err);
      S.lastError = true;
      // 最後のユーザーメッセージは残す（リトライで再送）
    }
    S.isLoading=false; render(); scrollChat();
  },

  async retryLastSend() {
    if (!S.lastSendPayload || S.isLoading) return;
    S.isLoading=true; S.lastError=false; render(); scrollChat();
    try {
      const text = await callAI(S.lastSendPayload, chatSystem());
      S.messages.push({ role:'ai', text });
      S.lastError=false;
    } catch(err) {
      S.lastError=true;
    }
    S.isLoading=false; render(); scrollChat();
  },

  _buildApiMsgs() {
    const apiMsgs = [];
    for (const m of S.messages) {
      if (m.role==='ai') {
        apiMsgs.push({ role:'assistant', content:m.text });
      } else {
        const label = m.role==='child' ? S.user.name||'こども' : S.user.parentName;
        apiMsgs.push({ role:'user', content:`[${label}] ${m.text}` });
      }
    }
    if (apiMsgs[0]?.role==='assistant') {
      apiMsgs.unshift({ role:'user', content:'はじめてください' });
    }
    return apiMsgs;
  },

  // ── サマリー生成 ──
  async goSummary() {
    S.flow='summary'; S.summaryItems=[]; S.summaryOpinion='';
    S.opinionOpen=false; S.bookmarked=false; S.currentNote='';
    render();

    try {
      const res  = await callAI(
        [{ role:'user', content:'まとめてください。' }],
        summarySystem()
      );
      const data = JSON.parse(res.replace(/```json|```/g,'').trim());
      S.summaryItems   = data.findings || [];
      S.summaryOpinion = data.opinion  || '';
    } catch(err) {
      console.error('summary error:', err);
      S.summaryItems   = ['いっぱい考えた！','気になることが見つかった'];
      S.summaryOpinion = 'ふたりとも、すごい発見だったね！';
    }

    App._saveRecord();
    persistSave();
    render();
  },

  // きろくノート保存
  saveNote() {
    const txt = $id('note-input')?.value?.trim() || '';
    S.currentNote = txt;
    const last = S.records[S.records.length-1];
    if (last) last.note = txt;
    persistSave();
    // 保存フィードバック
    const btn = document.querySelector('.note-save-btn');
    if (btn) { btn.textContent='✓ ほぞんしたよ！'; setTimeout(()=>{ btn.textContent='💾 ほぞんする'; },1500); }
  },

  _saveRecord() {
    if (S._savedThisSession) return;
    S._savedThisSession = true;
    const entry = {
      odai:       { ...S.odai },
      lens:       S.lens,
      date:       new Date().toISOString(),
      findings:   [...S.summaryItems],
      bookmarked: false,
      note:       '',
    };
    S.records.push(entry);
    const today     = new Date().toDateString();
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if (S._lastPlayDate !== today) {
      S.streak       = S._lastPlayDate===yesterday ? S.streak+1 : 1;
      S._lastPlayDate = today;
    }
  },

  doAgain() {
    S.lens=null; S.flow='lens'; S._savedThisSession=false; render();
  },

  nextOdai() {
    S.flow='home'; S.tab='home'; S.randOdai=null; render();
  },

  toggleBookmark() {
    S.bookmarked = !S.bookmarked;
    const last = S.records[S.records.length-1];
    if (last) last.bookmarked = S.bookmarked;
    persistSave();
    render();
  },

  toggleRecordFav(idx) {
    if (S.records[idx]) {
      S.records[idx].bookmarked = !S.records[idx].bookmarked;
      persistSave();
      render();
    }
  },

  showDayTakara(year, month, day) { S.dayModal={year,month,day}; render(); },
  closeDayModal() { S.dayModal=null; render(); },

  calPrev() {
    const now=new Date();
    let y=S.calYear??now.getFullYear(), m=S.calMonth??now.getMonth();
    if(--m<0){m=11;y--;} S.calYear=y; S.calMonth=m; render();
  },
  calNext() {
    const now=new Date();
    let y=S.calYear??now.getFullYear(), m=S.calMonth??now.getMonth();
    if(++m>11){m=0;y++;} S.calYear=y; S.calMonth=m; render();
  },

  toggleOpinion()     { S.opinionOpen=!S.opinionOpen; render(); },
  toggleShowOpinion() { S.showOpinion=!S.showOpinion; persistSave(); render(); },

  setFontSize(size) {
    S.fontSize = size;
    applyFontSize();
    persistSave();
    render();
  },

  // ウィークリーレポート生成
  async generateReport() {
    const sys = weeklyReportSystem();
    if (!sys) {
      alert('今週のきろくがまだないよ！たからさがしをしてからためしてね🔍');
      return;
    }
    S.reportLoading=true; render();
    try {
      const res  = await callAI([{ role:'user', content:'レポートをつくってください。' }], sys);
      const data = JSON.parse(res.replace(/```json|```/g,'').trim());
      S.weeklyReport = `✨ ハイライト\n${data.highlight}\n\n📈 のびている力\n${data.growth}\n\n💡 来週のヒント\n${data.next}`;
    } catch(err) {
      console.error('report error:', err);
      S.weeklyReport = '生成に失敗しました。もう一度試してみてください。';
    }
    S.reportLoading=false;
    persistSave();
    render();
  },

  saveSettings() {
    const name = $id('s-name')?.value?.trim();
    if (!name) {
      $id('s-name-err')?.classList.add('show');
      $id('s-name')?.classList.add('error');
      return;
    }
    S.user.name      = name;
    S.user.likes     = $id('s-likes')?.value?.trim() || '';
    S.user.strengths = $id('s-str')?.value?.trim()   || '';
    persistSave();
    App.switchTab('home');
  },
};

// ── 起動 ──
persistLoad();
applyFontSize();
render();

</script>
</body>
</html>
